# kind cluster config for the trust-boundary CI job.
#
# disableDefaultCNI=true turns OFF kindnet, kind's built-in CNI, because
# kindnet does NOT enforce NetworkPolicy. We install Calico instead, which
# does. Without this, the bypass-prevention test would pass vacuously (the
# policy would be ignored and we'd wrongly conclude the boundary holds).
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"   # Calico's default expected range
nodes:
  - role: control-plane
