name: publish-image

# Builds the gateway container image and publishes it to GitHub Container
# Registry (ghcr.io/tgandhle/mcp-auth-gateway). This is what makes
# deploy/k8s/gateway.yaml actually runnable: that manifest references
# ghcr.io/tgandhle/mcp-auth-gateway, which this workflow produces.
#
# Triggers:
#   - push to main           -> publishes :main and :sha-<short> (latest dev)
#   - push of a vX.Y.Z tag   -> publishes :X.Y.Z and :X.Y, plus :latest only
#                                when that tag is the newest release
#
# Uses the built-in GITHUB_TOKEN (no manual secrets). The package inherits the
# repo's visibility; make it public in the repo's Packages settings if you want
# the manifest to pull without auth.

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    # Don't rebuild on doc-only changes that can't affect the image.
    paths-ignore:
      - "**.md"
      - "deploy/k8s/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/trust-boundary.yml"

permissions:
  contents: read
  packages: write   # required to push to ghcr

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # tgandhle/mcp-auth-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          # Full history + tags: the :latest ranking step below compares this
          # tag against every other release tag, which a shallow clone lacks.
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # :latest must track the newest release, not merely the most recent push.
      # Previously any v* tag claimed :latest unconditionally, so cutting a
      # backport or hotfix tag on an older line (say v0.2.1 after v0.3.0) would
      # silently regress :latest to older code. Rank the pushed tag against
      # every release tag and claim :latest only when it is the highest.
      # Caveat: `--sort=-v:refname` orders pre-release suffixes ahead of the
      # final release unless versionsort.suffix is configured; revisit if this
      # project starts cutting -rc tags.
      - name: Determine whether this tag is the newest release
        id: relrank
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" != refs/tags/v* ]]; then
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            echo "not a version tag; :latest not claimed"
            exit 0
          fi
          newest="$(git tag --list 'v*' --sort=-v:refname | head -n1)"
          if [[ "${GITHUB_REF_NAME}" == "${newest}" ]]; then
            echo "is_latest=true" >> "$GITHUB_OUTPUT"
            echo "${GITHUB_REF_NAME} is the newest release tag; claiming :latest"
          else
            echo "is_latest=false" >> "$GITHUB_OUTPUT"
            echo "${GITHUB_REF_NAME} is older than ${newest}; not claiming :latest"
          fi

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # :latest only on the NEWEST version tag (see the relrank step),
            # never on a plain main push and never on an older release line.
            type=raw,value=latest,enable=${{ steps.relrank.outputs.is_latest == 'true' }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps rebuilds fast without a registry cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false   # simpler single-arch image; flip on if you want attestations
