name: ci

# PR 1 gate. Every push and PR runs the full quality bar:
#   lint (ruff) -> type-check (mypy) -> SAST (bandit) -> tests (pytest, incl.
#   parser fuzzing) -> dependency audit (pip-audit).
# All installs come from the committed uv.lock so CI builds are reproducible.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Check lockfile is up to date
        # Fails if uv.lock has drifted from pyproject.toml. Stricter and clearer
        # than relying on --frozen alone, and protects the reproducible-build
        # claim: a stale lock breaks CI rather than shipping silently.
        run: uv lock --check

      - name: Install (locked)
        # --frozen fails if uv.lock is out of date with pyproject.toml, so a
        # drifting lock file breaks CI instead of silently resolving fresh.
        run: uv sync --frozen --extra dev

      - name: Lint (ruff)
        run: uv run ruff check src tests

      - name: Type-check (mypy)
        run: uv run mypy src

      - name: SAST (bandit)
        run: uv run bandit -c pyproject.toml -r src

      - name: Tests (pytest + parser fuzzing)
        run: uv run pytest -q

  audit:
    # Dependency CVE scan runs in parallel; it inspects the locked deps, so it
    # doesn't need the dev tooling or the test run.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install (locked)
        run: uv sync --frozen

      - name: Dependency audit (pip-audit)
        # uvx runs pip-audit in an isolated temp env, so a bare `uvx pip-audit`
        # audits nothing from this project. Export the locked, non-dev
        # dependencies and audit that explicit set instead.
        run: |
          uv export --frozen --no-dev --no-emit-project --format requirements-txt --output-file requirements-audit.txt
          uvx pip-audit -r requirements-audit.txt
